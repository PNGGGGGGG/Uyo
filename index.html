<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うよ太郎誕生日おめでとう!!🎉</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Mochiy Pop One', sans-serif;
            background-color: #000;
        }

        /* --- メニュー関連 --- */
        #menu-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .hamburger {
            width: 35px;
            height: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 4px;
            background-color: white;
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .menu-hint {
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
            font-size: 16px;
            user-select: none;
        }

        #sidebar {
            position: fixed;
            top: 0;
            left: -80%;
            width: 60%;
            max-width: 300px;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            z-index: 900;
            transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #sidebar.active {
            left: 0;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin-top: 50px;
        }
        .menu-list li {
            margin-bottom: 20px;
            position: relative;
        }
        .menu-list a {
            text-decoration: none;
            color: #333;
            font-size: 18px;
            display: inline-block;
            padding: 10px;
            border-bottom: 1px solid #eee;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 20; 
        }
        .menu-list a:hover {
            color: #ff69b4;
            padding-left: 15px;
        }

        /* 通知バッジのスタイル */
        .badge {
            position: absolute;
            top: -5px;
            left: -5px;
            background-color: #ff0000;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 30;
        }

        .close-btn {
            align-self: flex-end;
            font-size: 30px;
            cursor: pointer;
            color: #333;
        }

        /* --- ？？？ セクション (音声再生) --- */
        #special-section {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #4b0082);
            z-index: 800;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* 豪華な再生ボタン */
        .play-button {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ff69b4, #da1b60);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.6), inset 0 0 15px rgba(255,255,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 4px solid #fff;
        }
        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.8);
        }
        .play-button:active { transform: scale(0.95); }
        .play-icon {
            width: 0; height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 35px solid white;
            margin-left: 10px;
        }

        /* メッセージアニメーション */
        #finish-message {
            margin-top: 40px;
            font-size: 18px;
            opacity: 0;
            text-align: center;
            transform: translateY(20px);
            transition: opacity 2s, transform 2s;
        }
        #finish-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .back-btn {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.7;
            cursor: pointer;
            text-decoration: underline;
        }
        .back-btn:hover {
            opacity: 1;
        }

        /* --- メインコンテンツ --- */
        #content {
            position: relative;
            width: 100%;
            height: 100%;
            /* ↓ ここを Uyo.gif に変更しました！ */
            background-image: url('Uyo.gif');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .message {
            position: relative;
            z-index: 2;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700, 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 5vw;
            margin: 0 20px;
            line-height: 1.2;
            animation: sparkle 2s infinite alternate;
        }

        @keyframes sparkle {
            from { text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700, 2px 2px 4px rgba(0,0,0,0.8); }
            to { text-shadow: 0 0 20px #FFA500, 0 0 40px #FFD700, 2px 2px 4px rgba(0,0,0,0.8), 0 0 60px #FFD700; }
        }

        /* --- オープニング --- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #popImage {
            max-width: 80%;
            max-height: 80%;
            transform: scale(0);
            animation: popBam 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
        }

        @keyframes popBam {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        #closeHint {
            position: absolute;
            bottom: 20px;
            color: white;
            font-size: 14px;
            opacity: 0;
            transition: opacity 1s;
            pointer-events: none;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="close-btn" onclick="toggleMenu()">×</div>
        <ul class="menu-list">
            <li><a href="#" onclick="showHome(); return false;">グルショ</a></li>
            <li>
                <div class="badge">1</div>
                <a href="letter.html" onclick="window.location.href='letter.html'; return false;">お手紙</a>
            </li>
            <li><a href="#" onclick="showSpecial(); return false;">？？？</a></li>
        </ul>
    </div>

    <div id="menu-container" onclick="toggleMenu()">
        <div class="hamburger">
            <span></span><span></span><span></span>
        </div>
        <div class="menu-hint">←このページが見飽きたらここを押して</div>
    </div>

    <div id="content">
        <div class="dark-overlay"></div>
        <h1 class="message">うよ太郎<br>誕生日おめでとう!!🎉</h1>
    </div>

    <div id="special-section">
        <h2 style="margin-bottom:30px; text-shadow: 0 0 10px rgba(255,255,255,0.5);">Secret Audio</h2>
        <div class="play-button" id="playBtn">
            <div class="play-icon"></div>
        </div>
        <div id="finish-message">【本日は以上ですありがとうございました。byペンギン】</div>
        <div class="back-btn" onclick="showHome()">← 元の画面に戻る</div>
    </div>

    <div id="overlay">
        <img src="1000053702.png" id="popImage" alt="お祝い画像">
        <div id="closeHint">画面の余白を押して閉じる</div>
    </div>

    <audio id="soundEffect" src="fuu.mp3" preload="auto"></audio>
    <audio id="secretAudio" src="？？？.m4a" preload="auto"></audio>

    <script>
        const sidebar = document.getElementById('sidebar');
        const specialSection = document.getElementById('special-section');
        const finishMsg = document.getElementById('finish-message');
        const secretAudio = document.getElementById('secretAudio');
        const playBtn = document.getElementById('playBtn');

        // メニューの開閉
        function toggleMenu() {
            sidebar.classList.toggle('active');
        }

        // ？？？画面を表示する
        function showSpecial() {
            sidebar.classList.remove('active');
            specialSection.style.display = 'flex';
        }

        // メイン画面に戻る
        function showHome() {
            specialSection.style.display = 'none';
            sidebar.classList.remove('active');
        }

        // Secret Audio 再生処理
        playBtn.addEventListener('click', () => {
            finishMsg.classList.remove('show');
            secretAudio.currentTime = 0;
            secretAudio.play();
        });

        secretAudio.onended = () => {
            finishMsg.classList.add('show');
            setTimeout(() => {
                finishMsg.classList.remove('show');
            }, 4000);
        };

        window.onload = function() {
            const overlay = document.getElementById('overlay');
            const audio = document.getElementById('soundEffect');
            const closeHint = document.getElementById('closeHint');
            
            // --- 音声の自動再生とタップ再生の対応 ---
            audio.volume = 0.5;
            let isAudioPlayed = false;

            function playStartSound() {
                if (!isAudioPlayed) {
                    audio.play().then(() => {
                        isAudioPlayed = true;
                    }).catch(e => {
                        console.log("自動再生がブロックされました。タップをお待ちしています。");
                    });
                }
            }

            // まず読み込み時に再生を試みる
            playStartSound();
            
            // ブロックされた場合、画面のどこかをタッチかクリックした瞬間に再生する
            document.addEventListener('click', playStartSound, { once: true });
            document.addEventListener('touchstart', playStartSound, { once: true });

            // --- 紙吹雪アニメーション (zIndexを追加して文字より手前に) ---
            var duration = 3000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ zIndex: 950, particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff69b4', '#ff0000', '#ffffff', '#FFD700'] });
                confetti({ zIndex: 950, particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff69b4', '#ff0000', '#ffffff', '#FFD700'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            setTimeout(() => {
                confetti({ zIndex: 950, particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ff69b4', '#ffffff', '#FFD700'] });
            }, 300);

            // --- オープニング画像を閉じる処理 ---
            setTimeout(() => {
                overlay.style.cursor = "pointer";
                closeHint.style.opacity = "0.7";
                overlay.addEventListener('click', function(e) {
                    if (e.target !== document.getElementById('popImage')) {
                        overlay.style.opacity = '0';
                        setTimeout(() => { overlay.style.display = 'none'; }, 500);
                    }
                });
            }, 3000);
        };
    </script>
</body>
</html>
